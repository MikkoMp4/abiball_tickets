services:
  abiball:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      # Persist SQLite database outside the container
      - ./data:/data
    env_file:
      # Copy .env.example to .env and fill in your values
      - .env
    environment:
      - DATA_DIR=/data
      - NODE_ENV=production
