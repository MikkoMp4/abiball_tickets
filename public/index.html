<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#e8500a">
  <title>Abiball 2026 – Ticketkauf</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav class="topbar">
  <h1>🎓 Abiball 2026</h1>
  <div class="nav-links">
    <a href="/admin.html">Admin</a>
  </div>
</nav>

<!-- Hero -->
<div class="hero">
  <h1>🎉 Willkommen zum Abiball 2026</h1>
  <p>Gib deinen persönlichen Zugangscode ein, um deine Tickets zu bestellen.</p>
</div>

<!-- Code-Eingabe -->
<div class="container">
  <div class="card" style="max-width:460px;margin:1.5rem auto 0;">
    <h2>🔑 Zugangscode eingeben</h2>

    <div id="alertBox"></div>

    <div class="form-group">
      <label for="codeInput">Dein Zugangscode (Format: XXXX-XXXX)</label>
      <input
        id="codeInput"
        type="text"
        class="code-input-big"
        placeholder="XXXX-XXXX"
        maxlength="9"
        autocomplete="off"
        spellcheck="false"
        inputmode="text"
      >
    </div>

    <button class="btn btn-primary" id="verifyBtn" style="width:100%;font-size:1rem;">
      Weiter →
    </button>
  </div>
</div>

<script src="/js/main.js"></script>
</body>
</html>
